<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos — El Tenedor (Funcional)</title>
<style>
  :root{
    --bg:
      radial-gradient(circle at top center, rgba(245,197,24,.12), transparent 24%),
      linear-gradient(180deg, #121212 0%, #181818 48%, #2a1b08 100%);
    --text:#fff;
    --muted:#c9c2b6;
    --card:#1a1a1a;
    --card-2:#202020;
    --border:rgba(255,255,255,.08);
    --accent:#f5c518;
    --green:#22c55e;
    --red:#ef4444;
    --shadow:0 16px 36px rgba(0,0,0,.28);
    --radius:16px;
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:var(--bg);
    color:var(--text);
  }
  body.modal-open{overflow:hidden}
  button,input,select,textarea{font:inherit}
  button{border:none;cursor:pointer}
  .container{
    width:min(1120px, calc(100% - 20px));
    margin:auto;
    padding:22px 0 28px;
  }

  .top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .top h2{
    margin:0;
    font-size:clamp(1.5rem, 3vw, 2rem);
  }

  .btn{
    padding:10px 14px;
    border-radius:12px;
    font-weight:800;
    transition:.16s ease;
  }
  .btn:hover{transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn-yellow{
    background:var(--accent);
    color:#000;
    box-shadow:0 10px 24px rgba(245,197,24,.18);
  }
  .btn-dark{
    background:#242424;
    color:#fff;
    border:1px solid var(--border);
  }
  .btn-red{
    background:rgba(239,68,68,.16);
    color:#ffd6d6;
    border:1px solid rgba(239,68,68,.18);
  }
  .btn-green{
    background:rgba(34,197,94,.16);
    color:#cbffd9;
    border:1px solid rgba(34,197,94,.18);
  }

  .toolbar{
    display:grid;
    grid-template-columns:1fr auto auto;
    gap:10px;
    margin-bottom:12px;
  }
  .search{
    width:100%;
    padding:12px 14px;
    border-radius:12px;
    border:1px solid var(--border);
    background:#1e1e1e;
    color:#fff;
    outline:none;
  }

  .filters{
    display:flex;
    gap:8px;
    margin-bottom:16px;
    flex-wrap:wrap;
  }
  .filter{
    padding:8px 12px;
    border-radius:999px;
    background:#1f1f1f;
    color:#fff;
    border:1px solid var(--border);
    cursor:pointer;
    font-size:14px;
    font-weight:800;
    transition:.16s ease;
  }
  .filter.active{
    background:var(--accent);
    color:#000;
    border-color:var(--accent);
  }

  .grid{
    display:grid;
    gap:10px;
  }

  .card{
    display:flex;
    gap:12px;
    background:linear-gradient(135deg, rgba(255,255,255,.04), rgba(245,197,24,.04));
    border:1px solid var(--border);
    border-radius:14px;
    padding:10px;
    align-items:center;
    box-shadow:var(--shadow);
    transition:.16s ease;
  }
  .card:hover{
    transform:translateY(-1px);
    border-color:rgba(245,197,24,.2);
  }
  .card.inactive-row{
    opacity:.64;
  }
  .card.clickable{cursor:pointer}

  .card img{
    width:82px;
    height:82px;
    object-fit:cover;
    border-radius:10px;
    background:#0f0f0f;
    flex-shrink:0;
  }

  .info{
    flex:1;
    min-width:0;
  }
  .name{
    font-weight:900;
    font-size:1rem;
    margin-bottom:4px;
  }
  .meta{
    font-size:13px;
    color:var(--muted);
    line-height:1.35;
  }

  .price{
    color:var(--accent);
    font-weight:900;
    font-size:1.05rem;
    min-width:78px;
    text-align:right;
    white-space:nowrap;
  }

  .actions{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    justify-content:flex-end;
    flex-shrink:0;
  }

  .small-btn{
    padding:8px 10px;
    border-radius:10px;
    font-size:12px;
    font-weight:800;
    cursor:pointer;
    transition:.16s ease;
  }
  .small-btn:hover{transform:translateY(-1px)}
  .small-btn:active{transform:translateY(0)}
  .edit{background:var(--accent);color:#000}
  .toggle{
    color:#fff;
    border:1px solid transparent;
  }
  .toggle.active{background:rgba(34,197,94,.16); color:#cbffd9; border-color:rgba(34,197,94,.18)}
  .toggle.inactive{background:rgba(239,68,68,.16); color:#ffd6d6; border-color:rgba(239,68,68,.18)}

  .empty{
    padding:18px;
    border:1px dashed var(--border);
    border-radius:14px;
    text-align:center;
    color:var(--muted);
    background:rgba(255,255,255,.03);
  }

  .drawer-backdrop{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.48);
    backdrop-filter:blur(4px);
    opacity:0;
    pointer-events:none;
    transition:.18s ease;
    z-index:90;
  }
  .drawer-backdrop.show{
    opacity:1;
    pointer-events:auto;
  }

  .drawer{
    position:fixed;
    top:0;
    right:0;
    width:min(460px, 100%);
    height:100vh;
    background:#111;
    border-left:1px solid rgba(245,197,24,.16);
    box-shadow:-20px 0 40px rgba(0,0,0,.32);
    z-index:100;
    transform:translateX(100%);
    transition:.2s ease;
    display:flex;
    flex-direction:column;
  }
  .drawer.show{transform:translateX(0)}

  .drawer-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
    padding:18px;
    border-bottom:1px solid var(--border);
  }
  .drawer-head h3{
    margin:0 0 4px;
    font-size:1.1rem;
  }
  .drawer-head p{
    margin:0;
    color:var(--muted);
    font-size:.92rem;
    line-height:1.4;
  }

  .drawer-close{
    width:40px;height:40px;border-radius:50%;
    background:#1f1f1f;color:#fff;border:1px solid var(--border);
    font-size:1.35rem;flex-shrink:0;
  }

  .drawer-body{
    padding:18px;
    overflow:auto;
    display:grid;
    gap:12px;
  }
  .field{
    display:grid;
    gap:7px;
  }
  .field label{
    font-size:.8rem;
    font-weight:900;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.03em;
  }
  .field input,
  .field select,
  .field textarea{
    width:100%;
    border-radius:12px;
    border:1px solid var(--border);
    background:#171717;
    color:#fff;
    padding:12px 14px;
    outline:none;
  }
  .field textarea{
    min-height:100px;
    resize:vertical;
  }
  .preview{
    width:100%;
    max-height:180px;
    object-fit:cover;
    border-radius:12px;
    border:1px solid var(--border);
    background:#0f0f0f;
    display:none;
  }
  .preview.show{display:block}

  .drawer-foot{
    padding:18px;
    border-top:1px solid var(--border);
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    background:#111;
  }
  .drawer-foot .btn{
    flex:1;
    min-width:140px;
  }

  .toast{
    position:fixed;
    left:50%;
    bottom:18px;
    transform:translateX(-50%) translateY(18px);
    background:#111;
    color:#fff;
    border:1px solid rgba(245,197,24,.16);
    padding:12px 16px;
    border-radius:12px;
    box-shadow:var(--shadow);
    opacity:0;
    pointer-events:none;
    transition:.2s ease;
    z-index:120;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  @media (max-width: 860px){
    .toolbar{grid-template-columns:1fr}
    .card{
      align-items:flex-start;
    }
    .price{
      text-align:left;
      min-width:auto;
    }
    .actions{
      justify-content:flex-start;
    }
  }

  @media (max-width: 640px){
    .card{
      display:grid;
      grid-template-columns:82px 1fr;
      gap:12px;
    }
    .price{
      grid-column:2;
      margin-top:-2px;
    }
    .actions{
      grid-column:1 / -1;
    }
    .drawer{width:100%}
  }
</style>
</head>
<body>

<div class="container">
  <div class="top">
    <h2>Productos</h2>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button class="btn btn-dark" id="refreshBtn" type="button">Actualizar</button>
      <button class="btn btn-yellow" id="openAddBtn" type="button">+ Agregar</button>
    </div>
  </div>

  <div class="toolbar">
    <input id="searchInput" class="search" placeholder="Buscar por nombre o categoría...">
    <button class="btn btn-dark" id="sortBtn" type="button">Ordenar A-Z</button>
    <button class="btn btn-dark" id="onlyActiveBtn" type="button">Solo activos: OFF</button>
  </div>

  <div class="filters" id="filters"></div>
  <div class="grid" id="productsGrid"></div>
</div>

<div class="drawer-backdrop" id="drawerBackdrop"></div>

<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-head">
    <div>
      <h3 id="drawerTitle">Agregar producto</h3>
      <p id="drawerSubtitle">Completá los datos del producto del menú.</p>
    </div>
    <button class="drawer-close" type="button" id="closeDrawerBtn">×</button>
  </div>

  <form class="drawer-body" id="productForm">
    <input type="hidden" id="productId">

    <div class="field">
      <label for="nameInput">Nombre</label>
      <input id="nameInput" type="text" placeholder="Ej. Hamburguesa completa" required>
    </div>

    <div class="field">
      <label for="priceInput">Precio</label>
      <input id="priceInput" type="number" min="0" step="1" placeholder="5000" required>
    </div>

    <div class="field">
      <label for="categoryInput">Categoría</label>
      <select id="categoryInput" required>
        <option value="Hamburguesas">Hamburguesas</option>
        <option value="Acompañamientos">Acompañamientos</option>
        <option value="Promos">Promos</option>
        <option value="Pizzas">Pizzas</option>
      </select>
    </div>

    <div class="field">
      <label for="descriptionInput">Descripción</label>
      <textarea id="descriptionInput" placeholder="Descripción breve del producto"></textarea>
    </div>

    <div class="field">
      <label for="imageInput">Foto</label>
      <input id="imageInput" type="file" accept="image/*">
      <img id="imagePreview" class="preview" alt="Vista previa">
    </div>

    <div class="field">
      <label for="statusInput">Estado</label>
      <select id="statusInput">
        <option value="true">Activo</option>
        <option value="false">Pausado</option>
      </select>
    </div>
  </form>

  <div class="drawer-foot">
    <button class="btn btn-dark" type="button" id="cancelBtn">Cancelar</button>
    <button class="btn btn-yellow" type="submit" form="productForm">Guardar producto</button>
  </div>
</aside>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_URL = "https://fytgzvqtthzswpihlpsh.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_C3LXcMFims8fu3P4arad_w_vfGp0gIi";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let products = [];
let currentCategory = 'Todas';
let onlyActive = false;
let sortAsc = true;
let tempImage = '';
const grid = document.getElementById('productsGrid');
const filters = document.getElementById('filters');
const searchInput = document.getElementById('searchInput');
const onlyActiveBtn = document.getElementById('onlyActiveBtn');
const sortBtn = document.getElementById('sortBtn');
const drawer = document.getElementById('drawer');
const drawerBackdrop = document.getElementById('drawerBackdrop');
const openAddBtn = document.getElementById('openAddBtn');
const closeDrawerBtn = document.getElementById('closeDrawerBtn');
const cancelBtn = document.getElementById('cancelBtn');
const drawerTitle = document.getElementById('drawerTitle');
const drawerSubtitle = document.getElementById('drawerSubtitle');
const form = document.getElementById('productForm');
const productId = document.getElementById('productId');
const nameInput = document.getElementById('nameInput');
const priceInput = document.getElementById('priceInput');
const categoryInput = document.getElementById('categoryInput');
const descriptionInput = document.getElementById('descriptionInput');
const imageInput = document.getElementById('imageInput');
const imagePreview = document.getElementById('imagePreview');
const statusInput = document.getElementById('statusInput');
const toast = document.getElementById('toast');
function showToast(message){ toast.textContent = message; toast.classList.add('show'); clearTimeout(showToast._timer); showToast._timer = setTimeout(() => toast.classList.remove('show'), 1800); }
function formatPrice(value){ return `$${Number(value || 0).toLocaleString('es-AR')}`; }
function getCategories(){ return ['Todas', ...new Set(products.map(p => p.category).filter(Boolean))]; }
function renderFilters(){ filters.innerHTML = getCategories().map(category => `<button class="filter ${currentCategory === category ? 'active' : ''}" data-category="${category}" type="button">${category}</button>`).join(''); filters.querySelectorAll('.filter').forEach(btn => btn.addEventListener('click', () => { currentCategory = btn.dataset.category; renderFilters(); renderProducts(); })); }
function getFilteredProducts(){ const search = searchInput.value.trim().toLowerCase(); let list = products.filter(product => { const matchesCategory = currentCategory === 'Todas' || product.category === currentCategory; const matchesActive = !onlyActive || product.active; const haystack = `${product.name} ${product.category} ${product.description || ''}`.toLowerCase(); return matchesCategory && matchesActive && haystack.includes(search); }); list.sort((a,b) => sortAsc ? a.name.localeCompare(b.name,'es') : b.name.localeCompare(a.name,'es')); return list; }
function renderProducts(){ const list = getFilteredProducts(); if (!list.length){ grid.innerHTML = `<div class="empty">No hay productos que coincidan con los filtros.</div>`; return; } grid.innerHTML = list.map(product => `<div class="card clickable ${product.active ? '' : 'inactive-row'}" data-id="${product.id}"><img src="${product.image || 'https://images.unsplash.com/photo-1550547660-d9450f859349?auto=format&fit=crop&w=900&q=80'}" alt="${product.name}"><div class="info"><div class="name">${product.name}</div><div class="meta">${product.category}</div></div><div class="price">${formatPrice(product.price)}</div><div class="actions"><button class="small-btn edit" data-edit="${product.id}" type="button">Editar</button><button class="small-btn toggle ${product.active ? 'active' : 'inactive'}" data-toggle="${product.id}" type="button">${product.active ? 'Activo' : 'Pausado'}</button></div></div>`).join(''); grid.querySelectorAll('[data-edit]').forEach(btn => btn.addEventListener('click', e => { e.stopPropagation(); openEdit(Number(btn.dataset.edit)); })); grid.querySelectorAll('[data-toggle]').forEach(btn => btn.addEventListener('click', async e => { e.stopPropagation(); await toggleStatus(Number(btn.dataset.toggle)); })); grid.querySelectorAll('.card.clickable').forEach(card => card.addEventListener('click', () => openEdit(Number(card.dataset.id)))); }
async function loadProducts(){ const { data, error } = await supabaseClient.from('products').select('*').order('sort_order', {ascending:true}).order('name', {ascending:true}); if (error){ console.error(error); showToast('No se pudieron cargar los productos'); return; } products = (data || []).map(item => ({ id:item.id, name:item.name, category:item.category, description:item.description || '', price:item.price, active:!!item.is_active, image:item.image_url || '' })); renderFilters(); renderProducts(); }
async function toggleStatus(id){ const product = products.find(p => p.id === id); if (!product) return; const next = !product.active; const { error } = await supabaseClient.from('products').update({ is_active: next }).eq('id', id); if (error){ console.error(error); showToast('No se pudo cambiar el estado'); return; } product.active = next; renderProducts(); showToast(next ? 'Producto activado' : 'Producto pausado'); }
function resetForm(){ form.reset(); productId.value = ''; tempImage = ''; imagePreview.src = ''; imagePreview.classList.remove('show'); statusInput.value = 'true'; }
function openDrawer(){ drawer.classList.add('show'); drawerBackdrop.classList.add('show'); drawer.setAttribute('aria-hidden','false'); document.body.classList.add('modal-open'); }
function closeDrawer(){ drawer.classList.remove('show'); drawerBackdrop.classList.remove('show'); drawer.setAttribute('aria-hidden','true'); document.body.classList.remove('modal-open'); }
function openAdd(){ resetForm(); drawerTitle.textContent='Agregar producto'; drawerSubtitle.textContent='Completá los datos del producto del menú.'; openDrawer(); }
function openEdit(id){ const product = products.find(p => p.id === id); if (!product) return; resetForm(); drawerTitle.textContent='Editar producto'; drawerSubtitle.textContent='Actualizá datos, foto o estado del producto.'; productId.value = product.id; nameInput.value = product.name; priceInput.value = product.price; categoryInput.value = product.category; descriptionInput.value = product.description; statusInput.value = String(product.active); tempImage = product.image || ''; if (tempImage){ imagePreview.src = tempImage; imagePreview.classList.add('show'); } openDrawer(); }
function handleImagePreview(file){ if (!file) return; const reader = new FileReader(); reader.onload = () => { tempImage = reader.result; imagePreview.src = tempImage; imagePreview.classList.add('show'); }; reader.readAsDataURL(file); }
async function uploadImageIfNeeded(){ const file = imageInput.files?.[0]; if (!file) return tempImage || null; const ext = file.name.split('.').pop() || 'jpg'; const path = `products/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`; const { error: uploadError } = await supabaseClient.storage.from('product-images').upload(path, file, { upsert: true }); if (uploadError) throw uploadError; const { data } = supabaseClient.storage.from('product-images').getPublicUrl(path); return data.publicUrl; }
form.addEventListener('submit', async (e) => { e.preventDefault(); const payload = { name:nameInput.value.trim(), category:categoryInput.value, description:descriptionInput.value.trim(), price:Number(priceInput.value || 0), is_active: statusInput.value === 'true' }; if (!payload.name || !payload.price){ showToast('Completá nombre y precio'); return; } try { const imageUrl = await uploadImageIfNeeded(); if (imageUrl) payload.image_url = imageUrl; let error; if (productId.value){ ({ error } = await supabaseClient.from('products').update(payload).eq('id', Number(productId.value))); } else { payload.sort_order = 0; ({ error } = await supabaseClient.from('products').insert(payload)); } if (error) throw error; await loadProducts(); closeDrawer(); showToast(productId.value ? 'Producto actualizado' : 'Producto agregado'); } catch(err){ console.error(err); showToast('No se pudo guardar el producto'); } });
searchInput.addEventListener('input', renderProducts);
onlyActiveBtn.addEventListener('click', () => { onlyActive = !onlyActive; onlyActiveBtn.textContent = `Solo activos: ${onlyActive ? 'ON' : 'OFF'}`; renderProducts(); });
sortBtn.addEventListener('click', () => { sortAsc = !sortAsc; sortBtn.textContent = sortAsc ? 'Ordenar A-Z' : 'Ordenar Z-A'; renderProducts(); });
imageInput.addEventListener('change', () => handleImagePreview(imageInput.files?.[0]));
openAddBtn.addEventListener('click', openAdd);
closeDrawerBtn.addEventListener('click', closeDrawer);
cancelBtn.addEventListener('click', closeDrawer);
drawerBackdrop.addEventListener('click', closeDrawer);
document.getElementById('refreshBtn').addEventListener('click', async () => { await loadProducts(); showToast('Vista actualizada'); });
document.addEventListener('keydown', event => { if (event.key === 'Escape') closeDrawer(); });
loadProducts();

</script>
</body>
</html>
