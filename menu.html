<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Productos — El Tenedor (Compacto)</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#121212;
  color:#fff;
}

.container{
  width:min(1100px, calc(100% - 20px));
  margin:auto;
  padding:20px 0;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.btn{
  padding:10px 14px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.btn-yellow{
  background:#f5c518;
  color:#000;
}

.search{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-bottom:10px;
  background:#1e1e1e;
  color:#fff;
}

.filters{
  display:flex;
  gap:8px;
  margin-bottom:15px;
  flex-wrap:wrap;
}

.filter{
  padding:8px 12px;
  border-radius:999px;
  background:#1e1e1e;
  cursor:pointer;
  font-size:14px;
}

.filter.active{
  background:#f5c518;
  color:#000;
}

.grid{
  display:grid;
  gap:10px;
}

.card{
  display:flex;
  gap:12px;
  background:#1a1a1a;
  border-radius:14px;
  padding:10px;
  align-items:center;
}

.card img{
  width:80px;
  height:80px;
  object-fit:cover;
  border-radius:10px;
}

.info{
  flex:1;
}

.name{
  font-weight:bold;
}

.price{
  color:#f5c518;
  font-weight:bold;
}

.meta{
  font-size:12px;
  color:#aaa;
}

.actions{
  display:flex;
  gap:6px;
}

.small-btn{
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  border:none;
  cursor:pointer;
}

.edit{
  background:#f5c518;
  color:#000;
}

.toggle{
  background:#333;
  color:#fff;
}

.active{
  background:#22c55e;
}

.inactive{
  background:#ef4444;
}

</style>
</head>

<body>

<div class="container">

  <div class="top">
    <h2>Productos</h2>
    <button class="btn btn-yellow">+ Agregar</button>
  </div>

  <input class="search" placeholder="Buscar producto...">

  <div class="filters">
    <div class="filter active">Todas</div>
    <div class="filter">Hamburguesas</div>
    <div class="filter">Pizzas</div>
    <div class="filter">Promos</div>
  </div>

  <div class="grid">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd">
      <div class="info">
        <div class="name">Hamburguesa completa</div>
        <div class="meta">Hamburguesas</div>
      </div>
      <div class="price">$5000</div>
      <div class="actions">
        <button class="small-btn edit">Editar</button>
        <button class="small-btn toggle active">Activo</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1550317138-10000687a72b">
      <div class="info">
        <div class="name">Hamburguesa doble</div>
        <div class="meta">Hamburguesas</div>
      </div>
      <div class="price">$6800</div>
      <div class="actions">
        <button class="small-btn edit">Editar</button>
        <button class="small-btn toggle active">Activo</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1573080496219-bb080dd4f877">
      <div class="info">
        <div class="name">Papas fritas</div>
        <div class="meta">Acompañamientos</div>
      </div>
      <div class="price">$4000</div>
      <div class="actions">
        <button class="small-btn edit">Editar</button>
        <button class="small-btn toggle inactive">Pausado</button>
      </div>
    </div>

  </div>

</div>

</body>
</html>
