<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>El Tenedor — Pedidos</title>
  <style>
    :root{
      --bg: linear-gradient(180deg, #121212 0%, #181818 55%, #2a1b08 100%);
      --panel: rgba(20,20,20,.94);
      --panel-2: rgba(255,255,255,.04);
      --card: rgba(255,255,255,.05);
      --border: rgba(245,197,24,.18);
      --border-soft: rgba(255,255,255,.08);
      --text: #ffffff;
      --muted: #d2cbc0;
      --accent: #f5c518;
      --accent-dark: #c89e12;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --orange: #f59e0b;
      --shadow: 0 18px 40px rgba(0,0,0,.30);
      --radius-xl: 24px;
      --radius-lg: 20px;
      --radius-md: 16px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button, input, select{
      font:inherit;
    }

    button{
      border:none;
      cursor:pointer;
    }

    .container{
      width:min(1500px, calc(100% - 24px));
      margin:0 auto;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      backdrop-filter: blur(14px);
      background: rgba(10,10,10,.82);
      border-bottom: 1px solid rgba(245,197,24,.12);
    }

    .topbar-inner{
      min-height:84px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      padding:14px 0;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .logo{
      width:56px;
      height:56px;
      border-radius:50%;
      background:#000;
      border:2px solid var(--accent);
      display:grid;
      place-items:center;
      color:var(--accent);
      font-weight:800;
      font-size:11px;
      line-height:1.05;
      text-transform:lowercase;
      text-align:center;
      padding:6px;
      flex-shrink:0;
    }

    .brand h1{
      margin:0 0 4px;
      font-size: clamp(1.4rem, 3vw, 2rem);
    }

    .brand p{
      margin:0;
      color: var(--muted);
      font-size:.95rem;
    }

    .top-actions{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .btn, .pill{
      border-radius:14px;
      padding:12px 16px;
      font-weight:800;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      white-space:nowrap;
      transition:.16s ease;
    }

    .btn:hover{transform:translateY(-1px)}
    .btn:active{transform:translateY(0)}

    .btn-accent{
      background: var(--accent);
      color:#000;
      box-shadow: 0 10px 24px rgba(245,197,24,.22);
    }

    .btn-dark{
      background: rgba(255,255,255,.05);
      color:#fff;
      border:1px solid rgba(255,255,255,.08);
    }

    .btn-danger{
      background: rgba(239,68,68,.16);
      color:#ffd2d2;
      border:1px solid rgba(239,68,68,.18);
    }

    .pill{
      background: rgba(245,197,24,.14);
      color:#ffe69a;
      border:1px solid rgba(245,197,24,.2);
    }

    .summary-row{
      padding:16px 0 12px;
      display:grid;
      grid-template-columns: 1fr auto auto;
      gap:12px;
      align-items:stretch;
    }

    .summary-card{
      background: rgba(255,255,255,.05);
      border:1px solid rgba(245,197,24,.14);
      border-radius:22px;
      padding:16px 18px;
      box-shadow: var(--shadow);
    }

    .summary-card small{
      display:block;
      color:var(--muted);
      margin-bottom:8px;
    }

    .summary-card strong{
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      line-height:1;
    }

    .mobile-tabs{
      display:none;
    }

    .kanban-grid{
      display:grid;
      grid-template-columns: repeat(5, minmax(280px, 1fr));
      gap:14px;
      align-items:start;
      overflow-x:auto;
      padding-bottom:20px;
    }

    .kanban-column{
      background: rgba(255,255,255,.03);
      border:1px solid rgba(245,197,24,.1);
      border-radius:24px;
      padding:12px;
      min-height:200px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }

    .column-header{
      background: rgba(0,0,0,.28);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:12px;
      margin-bottom:12px;
    }

    .column-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .column-title{
      margin:0;
      font-size:1rem;
    }

    .column-count{
      min-width:34px;
      height:34px;
      border-radius:999px;
      display:grid;
      place-items:center;
      font-weight:900;
      background: rgba(245,197,24,.14);
      color:#ffe69a;
    }

    .column-subtitle{
      margin-top:6px;
      color:var(--muted);
      font-size:.82rem;
    }

    .column-body{
      display:grid;
      gap:10px;
    }

    .order-card{
      background: rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:10px 12px;
      box-shadow: 0 12px 28px rgba(0,0,0,.22);
      transition:.16s ease;
    }

    .order-card:hover{
      transform:translateY(-1px);
      border-color:rgba(245,197,24,.2);
    }

    .order-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      cursor:pointer;
    }

    .order-summary{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      min-width:0;
    }

    .order-summary-item{
      font-size:.84rem;
      color:#f7f2e7;
    }

    .order-summary-item.muted{
      color:var(--muted);
    }

    .order-right{
      display:flex;
      align-items:center;
      gap:8px;
      flex-shrink:0;
    }

    .status-pill{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      padding:6px 10px;
      font-size:.7rem;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:.03em;
      line-height:1;
    }

    .status-nuevo{background:rgba(59,130,246,.18); color:#bfdbfe}
    .status-preparando{background:rgba(245,158,11,.18); color:#fde68a}
    .status-listo{background:rgba(245,197,24,.18); color:#fff0a8}
    .status-finalizado{background:rgba(34,197,94,.18); color:#bbf7d0}
    .status-cancelado{background:rgba(239,68,68,.18); color:#fecaca}

    .order-toggle{
      width:28px;
      height:28px;
      border-radius:999px;
      display:grid;
      place-items:center;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      font-size:12px;
      transition: transform .16s ease;
    }

    .order-body{display:none; margin-top:12px}
    .order-card.open .order-body{display:block}
    .order-card.open .order-toggle{transform:rotate(180deg)}

    .box{
      margin-top:10px;
      padding:12px;
      border-radius:14px;
      background: rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
    }

    .box:first-child{margin-top:0}

    .box h4{
      margin:0 0 10px;
      font-size:.95rem;
    }

    .order-meta{
      display:grid;
      gap:6px;
      color:#ece8df;
      font-size:.9rem;
    }

    .items ul{
      margin:0;
      padding-left:18px;
    }

    .items li{margin-bottom:8px}

    .action-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .field-row{
      display:grid;
      gap:10px;
      margin-top:10px;
    }

    .field-row.two-cols{
      grid-template-columns:1fr auto;
      align-items:end;
    }

    .small-label{
      display:block;
      margin-bottom:6px;
      color:var(--muted);
      font-size:.75rem;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.03em;
    }

    input[type="number"]{
      width:100%;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.1);
      background:#171717;
      color:#fff;
      padding:12px;
      font-size:.9rem;
    }

    .checkbox-line{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:12px;
      color:#f4f4f5;
    }

    .checkbox-line input{
      width:18px;
      height:18px;
      accent-color: var(--accent);
    }

    .price-preview{
      display:grid;
      gap:6px;
      margin-top:10px;
      font-size:.9rem;
    }

    .price-preview strong{
      font-size:1.05rem;
      color:#fff1b9;
    }

    .badge-confirmed,.badge-soft{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border-radius:999px;
      padding:7px 11px;
      font-size:.76rem;
      font-weight:800;
      margin-top:10px;
    }

    .badge-confirmed{background:rgba(34,197,94,.16); color:#bbf7d0}
    .badge-soft{background:rgba(255,255,255,.08); color:#e4e4e7}

    .empty,.column-empty{
      padding:18px;
      border:1px dashed rgba(255,255,255,.1);
      border-radius:18px;
      color:var(--muted);
      text-align:center;
    }

    @media (max-width:900px){
      .summary-row{grid-template-columns:1fr}
    }

    @media (max-width:768px){
      .container{width:min(100%, calc(100% - 16px))}
      .topbar-inner{align-items:flex-start}

      .mobile-tabs{
        display:flex;
        gap:8px;
        overflow-x:auto;
        padding:2px 0 14px;
        scrollbar-width:none;
      }

      .mobile-tabs::-webkit-scrollbar{display:none}

      .mobile-tab-btn{
        flex:0 0 auto;
        padding:10px 14px;
        border-radius:14px;
        border:1px solid rgba(255,255,255,.08);
        background:#1e1e1e;
        color:#fff;
        font-weight:900;
        font-size:.85rem;
        white-space:nowrap;
      }

      .mobile-tab-btn.active{
        background: var(--accent);
        color:#000;
        border-color: var(--accent);
      }

      .kanban-grid{
        grid-template-columns:1fr !important;
        overflow-x:visible;
      }

      .kanban-column{display:none}
      .kanban-column.active-mobile{display:block}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <div class="logo">el<br>tenedor</div>
        <div>
          <h1>Pedidos — El Tenedor</h1>
          <p>Panel operativo diario del local.</p>
        </div>
      </div>

      <div class="top-actions">
        <button class="btn btn-dark" type="button" id="refresh-btn">Actualizar</button>
        <button class="btn btn-danger" type="button" id="reset-day-btn">Reset del día</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="summary-row">
      <section class="summary-card">
        <small>Ventas del día</small>
        <strong id="sales-total">$84.600</strong>
      </section>

      <div class="pill" id="updated-at">Actualizado: 21:14</div>
      <div class="pill" id="day-cut-info">Corte del día: 00:00</div>
    </div>

    <div class="mobile-tabs" id="mobile-tabs">
      <button type="button" class="mobile-tab-btn active" data-tab="nuevos">Nuevos</button>
      <button type="button" class="mobile-tab-btn" data-tab="preparando">Preparando</button>
      <button type="button" class="mobile-tab-btn" data-tab="listo">Listos</button>
      <button type="button" class="mobile-tab-btn" data-tab="finalizados">Finalizados</button>
      <button type="button" class="mobile-tab-btn" data-tab="cancelados">Cancelados</button>
    </div>

    <div id="orders-container" class="kanban-grid"></div>
  </main>

  <script>
    const demoOrders = [
      {
        id: 1024,
        customer_name: "Mariano",
        status: "nuevo",
        order_type: "Delivery",
        address: "Av. San Martín 123",
        payment_method: "Efectivo",
        total: 10800,
        created_at: "21:14",
        notes: "Sin cebolla",
        items: [
          { quantity: 1, product_name: "Hamburguesa doble completa", subtotal: 6800 },
          { quantity: 1, product_name: "Porción de fritas", subtotal: 4000 }
        ],
        workflow: { deliveryFee: 0, finalPriceConfirmed: false, delivered: false, paid: false, finalTotal: 10800 }
      },
      {
        id: 1023,
        customer_name: "Rocío",
        status: "preparando",
        order_type: "Retiro en local",
        address: "",
        payment_method: "Transferencia",
        total: 15000,
        created_at: "20:57",
        notes: "",
        items: [
          { quantity: 1, product_name: "3 hamburguesas + fritas grandes", subtotal: 15000 }
        ],
        workflow: { deliveryFee: 0, finalPriceConfirmed: false, delivered: false, paid: true, finalTotal: 15000 }
      },
      {
        id: 1022,
        customer_name: "Sofi",
        status: "listo",
        order_type: "Delivery",
        address: "Barrio Centro 88",
        payment_method: "Efectivo",
        total: 13000,
        created_at: "20:33",
        notes: "Golpear portón",
        items: [
          { quantity: 1, product_name: "Pizza muzzarella", subtotal: 9000 },
          { quantity: 1, product_name: "Porción de fritas", subtotal: 4000 }
        ],
        workflow: { deliveryFee: 1000, finalPriceConfirmed: true, delivered: false, paid: false, finalTotal: 14000 }
      },
      {
        id: 1021,
        customer_name: "Lucas",
        status: "finalizado",
        order_type: "Delivery",
        address: "Mitre 550",
        payment_method: "Mercado Pago",
        total: 9000,
        created_at: "20:02",
        notes: "",
        items: [
          { quantity: 1, product_name: "Pizza muzzarella", subtotal: 9000 }
        ],
        workflow: { deliveryFee: 1000, finalPriceConfirmed: true, delivered: true, paid: true, finalTotal: 10000 }
      },
      {
        id: 1020,
        customer_name: "Ana",
        status: "cancelado",
        order_type: "Retiro en local",
        address: "",
        payment_method: "Efectivo",
        total: 5000,
        created_at: "19:41",
        notes: "Cliente canceló",
        items: [
          { quantity: 1, product_name: "Hamburguesa completa", subtotal: 5000 }
        ],
        workflow: { deliveryFee: 0, finalPriceConfirmed: false, delivered: false, paid: false, finalTotal: 5000 }
      }
    ];

    const ordersContainer = document.getElementById('orders-container');
    const updatedAtEl = document.getElementById('updated-at');
    const dayCutInfoEl = document.getElementById('day-cut-info');
    let openedOrderId = null;

    function formatPrice(value) {
      return new Intl.NumberFormat('es-AR', {
        style: 'currency',
        currency: 'ARS',
        maximumFractionDigits: 0
      }).format(Number(value || 0));
    }

    function renderNewActions(order) {
      return `
        <div class="box">
          <h4>Acciones</h4>
          <div class="action-row">
            <button class="btn btn-accent" type="button">Confirmar</button>
            <button class="btn btn-danger" type="button">Rechazar</button>
          </div>
        </div>
      `;
    }

    function renderPreparingActions(order) {
      return `
        <div class="box">
          <h4>Cocina</h4>
          <div class="action-row">
            <button class="btn btn-accent" type="button">Marcar listo</button>
            <button class="btn btn-dark" type="button">Cancelar</button>
          </div>
        </div>
      `;
    }

    function renderReadyActions(order) {
      const workflow = order.workflow || {};
      return `
        <div class="box">
          <h4>Entrega y cobro</h4>
          <div class="field-row two-cols">
            <div>
              <label class="small-label">Costo de envío</label>
              <input type="number" value="${workflow.deliveryFee || 0}" />
            </div>
            <button class="btn btn-accent" type="button">Confirmar precio</button>
          </div>

          <div class="price-preview">
            <div>Total productos: ${formatPrice(order.total)}</div>
            <div>Envío: ${formatPrice(workflow.deliveryFee || 0)}</div>
            <strong>Total final: ${formatPrice(workflow.finalTotal || order.total)}</strong>
          </div>

          <div class="${workflow.finalPriceConfirmed ? 'badge-confirmed' : 'badge-soft'}">
            ${workflow.finalPriceConfirmed ? 'Precio final confirmado' : 'Precio final pendiente'}
          </div>

          <label class="checkbox-line">
            <input type="checkbox" ${workflow.paid ? 'checked' : ''} />
            <span>Pagado</span>
          </label>

          <div class="action-row" style="margin-top:12px;">
            <button class="btn btn-accent" type="button">${workflow.delivered ? 'Entregado ✓' : 'Entregado'}</button>
          </div>
        </div>
      `;
    }

    function renderFinalizedSummary(order) {
      const workflow = order.workflow || {};
      return `
        <div class="box">
          <h4>Resumen final</h4>
          <div class="price-preview">
            <div>Total productos: ${formatPrice(order.total)}</div>
            <div>Envío: ${formatPrice(workflow.deliveryFee || 0)}</div>
            <strong>Total final: ${formatPrice(workflow.finalTotal || order.total)}</strong>
          </div>
          <div class="badge-confirmed">Pedido cobrado y entregado</div>
        </div>
      `;
    }

    function renderCancelledSummary() {
      return `
        <div class="box">
          <h4>Pedido cancelado</h4>
          <div class="price-preview">
            <div>Este pedido ya no participa del flujo del día.</div>
          </div>
        </div>
      `;
    }

    function renderOrderCard(order) {
      const orderItemsCount = order.items.reduce((sum, item) => sum + Number(item.quantity || 0), 0);

      let extraHtml = '';
      if (order.status === 'nuevo') extraHtml = renderNewActions(order);
      if (order.status === 'preparando') extraHtml = renderPreparingActions(order);
      if (order.status === 'listo') extraHtml = renderReadyActions(order);
      if (order.status === 'finalizado') extraHtml = renderFinalizedSummary(order);
      if (order.status === 'cancelado') extraHtml = renderCancelledSummary();

      return `
        <article class="order-card" data-order-id="${order.id}">
          <div class="order-header">
            <div class="order-summary">
              <span class="order-summary-item"><strong>Pedido #${order.id}</strong></span>
              <span class="order-summary-item muted">${order.customer_name || 'Cliente sin nombre'}</span>
              <span class="order-summary-item muted">${order.created_at}</span>
              <span class="order-summary-item muted">${orderItemsCount} ítem${orderItemsCount === 1 ? '' : 's'}</span>
              <span class="order-summary-item"><strong>${formatPrice(order.workflow?.finalTotal || order.total)}</strong></span>
            </div>

            <div class="order-right">
              <span class="status-pill status-${order.status}">${order.status.toUpperCase()}</span>
              <span class="order-toggle">▼</span>
            </div>
          </div>

          <div class="order-body">
            <div class="box">
              <h4>Datos del pedido</h4>
              <div class="order-meta">
                <div><strong>Cliente:</strong> ${order.customer_name || '-'}</div>
                <div><strong>Tipo:</strong> ${order.order_type || '-'}</div>
                ${order.address ? `<div><strong>Dirección:</strong> ${order.address}</div>` : ''}
                <div><strong>Pago:</strong> ${order.payment_method || '-'}</div>
                <div><strong>Total base:</strong> ${formatPrice(order.total)}</div>
                <div><strong>Observaciones:</strong> ${order.notes || '-'}</div>
              </div>
            </div>

            <div class="box items">
              <h4>Productos</h4>
              <ul>
                ${order.items.map(item => `<li>${item.quantity} x ${item.product_name} — ${formatPrice(item.subtotal)}</li>`).join('')}
              </ul>
            </div>

            ${extraHtml}
          </div>
        </article>
      `;
    }

    function renderColumn(key, title, subtitle, orders) {
      return `
        <section class="kanban-column column-${key}" data-status="${key}">
          <div class="column-header">
            <div class="column-top">
              <h2 class="column-title">${title}</h2>
              <span class="column-count">${orders.length}</span>
            </div>
            <div class="column-subtitle">${subtitle}</div>
          </div>
          <div class="column-body">
            ${orders.length ? orders.map(renderOrderCard).join('') : '<div class="column-empty">No hay pedidos en esta columna.</div>'}
          </div>
        </section>
      `;
    }

    function renderOrders() {
      const nuevos = demoOrders.filter(order => order.status === 'nuevo');
      const preparando = demoOrders.filter(order => order.status === 'preparando');
      const listo = demoOrders.filter(order => order.status === 'listo');
      const finalizados = demoOrders.filter(order => order.status === 'finalizado');
      const cancelados = demoOrders.filter(order => order.status === 'cancelado');

      ordersContainer.innerHTML = [
        renderColumn('nuevos', 'Nuevos', 'Confirmar o rechazar', nuevos),
        renderColumn('preparando', 'Preparando', 'Pedidos en cocina', preparando),
        renderColumn('listo', 'Listos', 'Entrega y cobro', listo),
        renderColumn('finalizados', 'Finalizados', 'Entregados y pagos', finalizados),
        renderColumn('cancelados', 'Cancelados', 'Rechazados o anulados', cancelados)
      ].join('');

      enableOrderAccordion();
      restoreOpenedOrder();
      bindMobileTabs();
      setActiveMobileTab(document.querySelector('.mobile-tab-btn.active')?.dataset.tab || 'nuevos');
    }

    function enableOrderAccordion() {
      document.querySelectorAll('.order-header').forEach(header => {
        header.addEventListener('click', (event) => {
          if (event.target.closest('button, input, label, a, select, textarea')) return;

          const card = header.closest('.order-card');
          const orderId = String(card.dataset.orderId || '');
          const isOpen = card.classList.contains('open');

          document.querySelectorAll('.order-card.open').forEach(openCard => {
            openCard.classList.remove('open');
          });

          if (!isOpen) {
            card.classList.add('open');
            openedOrderId = orderId;
          } else {
            openedOrderId = null;
          }
        });
      });
    }

    function restoreOpenedOrder() {
      if (!openedOrderId) return;
      const targetCard = document.querySelector(`.order-card[data-order-id="${openedOrderId}"]`);
      if (targetCard) {
        targetCard.classList.add('open');
      } else {
        openedOrderId = null;
      }
    }

    function setActiveMobileTab(tab) {
      const isMobile = window.innerWidth <= 768;
      const columns = document.querySelectorAll('.kanban-column');
      const buttons = document.querySelectorAll('.mobile-tab-btn');

      if (!isMobile) {
        columns.forEach(col => col.classList.remove('active-mobile'));
        buttons.forEach(btn => btn.classList.remove('active'));
        return;
      }

      columns.forEach(col => {
        const status = col.dataset.status || '';
        col.classList.toggle('active-mobile', status === tab);
      });

      buttons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
      });
    }

    function bindMobileTabs() {
      document.querySelectorAll('.mobile-tab-btn').forEach(btn => {
        btn.onclick = () => setActiveMobileTab(btn.dataset.tab);
      });
    }

    document.getElementById('refresh-btn').addEventListener('click', () => {
      updatedAtEl.textContent = `Actualizado: ${new Date().toLocaleTimeString('es-AR', {hour: '2-digit', minute: '2-digit'})}`;
    });

    document.getElementById('reset-day-btn').addEventListener('click', () => {
      dayCutInfoEl.textContent = `Corte del día: ${new Date().toLocaleTimeString('es-AR', {hour: '2-digit', minute: '2-digit'})}`;
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth <= 768) {
        const activeBtn = document.querySelector('.mobile-tab-btn.active');
        setActiveMobileTab(activeBtn?.dataset.tab || 'nuevos');
      } else {
        setActiveMobileTab('');
      }
    });

    renderOrders();
  </script>
</body>
</html>
